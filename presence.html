<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIX - Presensi Kelas Interaktif</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <style>
        :root {
            --primary-blue: #32589f; --header-blue: #3a68b7; --bg-color: #f5f7fb;
            --text-dark: #222; --text-gray: #7a869a; --white: #ffffff;
            --border-radius-lg: 24px; --border-radius-md: 12px;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04); --shadow-md: 0 4px 12px rgba(50, 88, 159, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #e0e5ec; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .app-container {
            width: 100%; max-width: 414px; background-color: var(--bg-color);
            min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1);
            overflow-x: hidden; padding-bottom: 90px;
        }

        header { background-color: var(--header-blue); color: var(--white); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo-area { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 700; }
        .logo-icon { width: 32px; height: 32px; background-color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: var(--header-blue); }

        main { padding: 20px; }

        .title-area { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .title-subtitle { font-size: 10px; font-weight: 700; color: var(--primary-blue); letter-spacing: 0.5px; }
        .title-main { font-size: 24px; font-weight: 800; color: var(--primary-blue); }

        /* Desain Tombol Sync Baru */
        .sync-card {
            background-color: #eef4ff; border: 1px solid #d6e4ff; border-radius: var(--border-radius-md); 
            padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
        }
        .sync-info { font-size: 11px; font-weight: 600; color: var(--primary-blue); }
        .btn-sync { 
            background: var(--white); border: 1px solid var(--primary-blue); color: var(--primary-blue);
            padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; gap: 4px; transition: 0.2s;
        }
        .btn-sync:active { background: var(--primary-blue); color: var(--white); }

        .form-group { margin-bottom: 16px; }
        .form-label { font-size: 10px; font-weight: 700; color: #555; margin-bottom: 6px; display: block; }
        .form-input { width: 100%; padding: 14px 16px; border: 1px solid #eee; border-radius: var(--border-radius-md); background-color: var(--white); font-size: 14px; font-weight: 600; color: var(--text-dark); box-shadow: var(--shadow-sm); outline: none; appearance: none; }
        select.form-input { cursor: pointer; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 16px center; background-size: 16px; padding-right: 40px; }
        .form-input:focus { border-color: var(--primary-blue); }
        .form-input[readonly], select:disabled { background-color: #eef2fa; color: #555; cursor: not-allowed; }

        .camera-container {
            background-color: #000; border-radius: var(--border-radius-lg); height: 320px; position: relative; 
            margin: 24px 0; overflow: hidden; display: flex; justify-content: center; align-items: center;
        }
        #video, #canvas-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        .camera-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; color: white; text-align: center; 
            padding: 20px; z-index: 20; backdrop-filter: blur(5px);
        }
        .overlay-icon { font-size: 48px; margin-bottom: 12px; color: #e74c3c; }
        .overlay-text { font-size: 14px; font-weight: 600; line-height: 1.5; }
        .btn-retry-loc { margin-top: 16px; padding: 8px 16px; background: white; color: #222; border: none; border-radius: 20px; font-weight: 700; cursor: pointer; }

        .badge { position: absolute; top: 16px; left: 16px; z-index: 10; background-color: rgba(255, 255, 255, 0.7); backdrop-filter: blur(4px); border-radius: 20px; padding: 6px 12px; font-size: 10px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
        .dot { width: 6px; height: 6px; background-color: #e74c3c; border-radius: 50%; }
        .timestamp-box { position: absolute; bottom: 16px; left: 16px; z-index: 10; background-color: rgba(255, 255, 255, 0.7); backdrop-filter: blur(4px); padding: 10px 14px; border-radius: 12px; }
        .timestamp-label { font-size: 8px; font-weight: 700; color: var(--primary-blue); }
        .timestamp-value { font-size: 11px; font-weight: 700; color: #111; }

        .location-card { background-color: var(--white); border-radius: var(--border-radius-md); padding: 12px 16px; display: flex; align-items: center; gap: 16px; box-shadow: var(--shadow-sm); margin-bottom: 24px; }
        .loc-icon-wrapper { background-color: #eef2fa; width: 40px; height: 40px; border-radius: 10px; display: flex; justify-content: center; align-items: center; color: var(--primary-blue); }
        .loc-details { flex: 1; }
        .loc-input { width: 100%; border: none; font-size: 13px; font-weight: 700; color: #222; outline: none; background: transparent; }

        .action-row { display: flex; gap: 12px; margin-bottom: 24px; }
        .btn-half { flex: 1; padding: 14px; border-radius: var(--border-radius-md); font-size: 14px; font-weight: 600; display: flex; justify-content: center; align-items: center; gap: 8px; cursor: pointer; border: none; }
        .btn-ambil-foto { background-color: #eef4ff; color: var(--primary-blue); border: 1px solid #d6e4ff; }
        .btn-ambil-ulang { background-color: var(--white); color: var(--text-gray); box-shadow: var(--shadow-sm); }
        .btn-half:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-submit { width: 100%; background: linear-gradient(135deg, #2b4c8a, #3867c4); color: var(--white); padding: 18px; border-radius: 30px; font-size: 16px; font-weight: 600; border: none; display: flex; justify-content: center; align-items: center; gap: 10px; box-shadow: var(--shadow-md); cursor: pointer; }

        .bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; background-color: var(--white); border-top-left-radius: var(--border-radius-lg); border-top-right-radius: var(--border-radius-lg); display: flex; justify-content: space-around; padding: 10px 10px 20px; box-shadow: 0 -4px 20px rgba(0,0,0,0.05); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-gray); text-decoration: none; }
        .nav-item.active { color: var(--primary-blue); }
        .nav-item span { font-size: 9px; font-weight: 700; margin-top: 4px; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="logo-area"><div class="logo-icon"><span class="material-symbols-outlined" style="font-size: 20px;">cyclone</span></div> SIX</div>
            <div class="profile-avatar"><span class="material-symbols-outlined" style="color:white; font-size: 30px;">account_circle</span></div>
        </header>

        <main>
            <div class="title-area">
                <div>
                    <div class="title-subtitle">SISTEM INFORMASI AKADEMIK</div>
                    <div class="title-main">PRESENSI KELAS</div>
                </div>
            </div>

            <div class="sync-card">
                <div class="sync-info" id="sync-status">Menunggu data tap hardware...</div>
                <button class="btn-sync" id="btn-sync">
                    <span class="material-symbols-outlined" style="font-size: 16px;">sync</span> Sync Data
                </button>
            </div>

            <div class="form-group">
                <label class="form-label">NOMOR INDUK MAHASISWA (NIM)</label>
                <select class="form-input" id="input-nim">
                    <option value="" selected disabled>Belum ada data tap masuk...</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">NAMA MAHASISWA</label>
                <input type="text" class="form-input" placeholder="Otomatis terisi jika sudah tap kartu" id="input-nama" readonly>
            </div>

            <div class="camera-container">
                <div class="camera-overlay" id="cam-overlay">
                    <span class="material-symbols-outlined overlay-icon" id="overlay-icon">location_searching</span>
                    <div class="overlay-text" id="overlay-msg">Mengecek Lokasi Anda...<br>Kamera terkunci hingga lokasi diverifikasi.</div>
                    <button class="btn-retry-loc" id="btn-retry-loc" style="display:none;">Cek Ulang Lokasi</button>
                </div>

                <div class="badge" id="live-indicator"><div class="dot"></div> LIVE PREVIEW</div>
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas" style="display:none;"></canvas>
                <img id="canvas-img" alt="Captured Photo">
                <div class="timestamp-box">
                    <div class="timestamp-label">TIMESTAMP</div>
                    <div class="timestamp-value" id="current-date-time">-- --- ---- • --:--:-- WIB</div>
                </div>
            </div>

            <div class="location-card">
                <div class="loc-icon-wrapper"><span class="material-symbols-outlined">map</span></div>
                <div class="loc-details">
                    <label class="form-label" style="margin-bottom:0">LOKASI TERDETEKSI</label>
                    <input type="text" class="loc-input" value="Sedang mencari koordinat..." id="input-lokasi" readonly>
                </div>
            </div>

            <div class="action-row">
                <button class="btn-half btn-ambil-foto" id="btn-snap" disabled><span class="material-symbols-outlined">photo_camera</span> Ambil Foto</button>
                <button class="btn-half btn-ambil-ulang" id="btn-retake" disabled><span class="material-symbols-outlined">refresh</span> Ambil Ulang</button>
            </div>

            <button class="btn-submit" id="btn-submit">
                <span class="material-symbols-outlined">check_circle</span> Tandai Hadir
            </button>
        </main>

        <nav class="bottom-nav">
            <a href="#" class="nav-item active"><span class="material-symbols-outlined">photo_camera</span><span>ATTENDANCE</span></a>
            <a href="#" class="nav-item"><span class="material-symbols-outlined">history</span><span>HISTORY</span></a>
            <a href="#" class="nav-item"><span class="material-symbols-outlined">person</span><span>PROFILE</span></a>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        // 2. KONFIGURASI FIREBASE 
        const firebaseConfig = {
            apiKey: "AIzaSyBnXLBzGQQI0UOTrREkmTcrtQePd3_tzNA",
            authDomain: "presence-17254.firebaseapp.com",
            projectId: "presence-17254",
            storageBucket: "presence-17254.firebasestorage.app",
            messagingSenderId: "340867429104",
            appId: "1:340867429104:web:bd8c844bff3519e1bb4835"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        // -------------------------------------------------------

        const API_URL = 'https://script.google.com/macros/s/AKfycbxUQF6q5FplCepntQaTEGsUO88d7snry-3nIYr9lBGainkqKDSt5VvOQpc5xqmk59wyIQ/exec';
        
        let dbMahasiswa = {}; 

        let currentLat = null;
        let currentLng = null;

        const selectNim = document.getElementById('input-nim');
        const inputNama = document.getElementById('input-nama');
        const syncStatus = document.getElementById('sync-status');

        // --- FUNGSI TARIK DATA GOOGLE SPREADSHEET ---
        async function fetchDataFromSheet() {
            if(API_URL != 'https://script.google.com/macros/s/AKfycbxUQF6q5FplCepntQaTEGsUO88d7snry-3nIYr9lBGainkqKDSt5VvOQpc5xqmk59wyIQ/exec') {
                alert("PENTING: Masukkan Database Tap Kartu!");
                return;
            }

            syncStatus.textContent = "Menyinkronkan data...";
            syncStatus.style.color = "#f39c12";

            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                dbMahasiswa = {};
                selectNim.innerHTML = '<option value="" selected disabled>Pilih NIM Anda...</option>';
                
                let count = 0;
                data.forEach(mhs => {
                    if(mhs.NIM && mhs.NAMA) {
                        dbMahasiswa[mhs.NIM] = mhs.NAMA;
                        const option = document.createElement('option');
                        option.value = mhs.NIM;
                        option.textContent = mhs.NIM;
                        selectNim.appendChild(option);
                        count++;
                    }
                });

                if(count > 0) {
                    syncStatus.textContent = `${count} Mahasiswa Terdeteksi!`;
                    syncStatus.style.color = "#27ae60";
                } else {
                    syncStatus.textContent = "Belum ada kartu yang di-tap";
                    syncStatus.style.color = "#e74c3c";
                    selectNim.innerHTML = '<option value="" selected disabled>Belum ada data tap masuk...</option>';
                }

            } catch (error) {
                console.error("Gagal sinkronisasi:", error);
                syncStatus.textContent = "Gagal terhubung ke Database";
                syncStatus.style.color = "#e74c3c";
            }
        }

        document.getElementById('btn-sync').addEventListener('click', fetchDataFromSheet);
        // ------------------------------------------------------------------------------

        // Isi otomatis nama berdasarkan NIM yang ditarik dari Spreadsheet
        selectNim.addEventListener('change', function() {
            inputNama.value = dbMahasiswa[this.value] || '';
        });

        // LOGIKA GPS & KAMERA
        const TARGET_LAT = -6.9297688;
        const TARGET_LNG = 107.7688217; 
        const ALLOWED_RADIUS_METERS = 10; 

        let isLocationValid = false;

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return Math.round(R * c); 
        }

        const overlay = document.getElementById('cam-overlay');
        const overlayIcon = document.getElementById('overlay-icon');
        const overlayMsg = document.getElementById('overlay-msg');
        const btnRetryLoc = document.getElementById('btn-retry-loc');
        const btnSnap = document.getElementById('btn-snap');
        const btnRetake = document.getElementById('btn-retake');
        const inputLokasi = document.getElementById('input-lokasi');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const canvasImg = document.getElementById('canvas-img');
        const liveIndicator = document.getElementById('live-indicator');

        function checkLocation() {
            overlayMsg.innerHTML = "Mengecek Lokasi Anda...<br>Pastikan GPS Aktif.";
            overlayIcon.textContent = "location_searching";
            overlayIcon.style.color = "#f1c40f";
            btnRetryLoc.style.display = "none";

            if (!navigator.geolocation) {
                showLocationError("Browser tidak mendukung Geolocation.");
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    currentLat = position.coords.latitude;
                    currentLng = position.coords.longitude;
                    const distance = getDistance(currentLat, currentLng, TARGET_LAT, TARGET_LNG);
                    inputLokasi.value = `Lat: ${currentLat.toFixed(4)}, Lng: ${currentLng.toFixed(4)}`;

                    if (distance <= ALLOWED_RADIUS_METERS) {
                        isLocationValid = true;
                        overlay.style.display = "none";
                        video.style.display = "block";
                        btnSnap.disabled = false;
                        btnRetake.disabled = false;
                        startCamera();
                    } else {
                        showLocationError(`Di luar radius kelas!<br>Jarak Anda: ${distance} m.`, "location_off");
                    }
                },
                (error) => { showLocationError("Gagal mendapatkan lokasi GPS."); },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }

        btnRetryLoc.addEventListener('click', checkLocation);

        function showLocationError(msg, icon = "error") {
            overlayIcon.textContent = icon;
            overlayIcon.style.color = "#e74c3c";
            overlayMsg.innerHTML = msg;
            btnRetryLoc.style.display = "block";
            isLocationValid = false;
            btnSnap.disabled = true;
            btnRetake.disabled = true;
            if(video.srcObject) video.srcObject.getTracks().forEach(track => track.stop());
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                video.srcObject = stream;
            } catch (err) { showLocationError("Akses kamera ditolak.", "videocam_off"); }
        }

        btnSnap.addEventListener('click', () => {
            if (!video.srcObject || !isLocationValid) return; 
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            canvasImg.src = canvas.toDataURL('image/png');
            video.style.display = 'none'; canvasImg.style.display = 'block';
            liveIndicator.innerHTML = '<div class="dot" style="background:gray"></div> CAPTURED';
        });

        btnRetake.addEventListener('click', () => {
            if(!isLocationValid) return;
            video.style.display = 'block'; canvasImg.style.display = 'none';
            liveIndicator.innerHTML = '<div class="dot"></div> LIVE PREVIEW'; canvasImg.src = ""; 
        });

        // --- EDIT DISINI: Logika submit ke Firebase & Sheet Dosen ---
        const URL_SHEET_DOSEN = 'https://script.google.com/macros/s/AKfycbxO-h64mOeSabrIpMEQ_eqH24nzRDHAbW2KtVVhC8lVTEE_5WmTy0n1ugtRJIbrFuyX/exec';

        document.getElementById('btn-submit').addEventListener('click', async () => {
            if (Object.keys(dbMahasiswa).length === 0) { alert("Data tap hardware kosong! Pastikan tap kartu di pintu."); return; }
            if (selectNim.value === "") { alert("Pilih NIM Anda!"); return; }
            if (!isLocationValid) { alert("Lokasi Anda tidak valid!"); return; }
            if (canvasImg.src === "" || canvasImg.style.display === "none") { alert("Harap foto presensi!"); return; }
            
            const btnSubmit = document.getElementById('btn-submit');
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = "Menyimpan..."; // Feedback UI saat proses upload

            const dataToSave = {
                nim: selectNim.value,
                nama: inputNama.value,
                lat: currentLat,
                lon: currentLng,
                foto: canvasImg.src,
                waktu: new Date().toLocaleString()
            };

            try {
                // 1. Simpan ke Firebase Database
                await addDoc(collection(db, "presensi_kelas"), dataToSave);
                
                // 2. Simpan ke Spreadsheet Dosen
                await fetch(URL_SHEET_DOSEN, {
                    method: "POST",
                    body: JSON.stringify(dataToSave)
                });

                alert(`✅ ABSENSI BERHASIL!\nData tersimpan di Firebase & Spreadsheet Dosen.\nNama: ${inputNama.value}\nNIM: ${selectNim.value}`);
            } catch (err) {
                alert("❌ Gagal menyimpan data.");
                console.error(err);
            }

            btnSubmit.innerHTML = `<span class="material-symbols-outlined">check_circle</span> Tandai Hadir`;
            btnSubmit.disabled = false;
        });
        // ----------------------------------------------

        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            document.getElementById('current-date-time').textContent = 
                `${String(now.getDate()).padStart(2, '0')} ${months[now.getMonth()]} ${now.getFullYear()} • ${hours}:${minutes}:${seconds} WIB`;
        }
        setInterval(updateTime, 1000); updateTime();
        
        // Pengecekan GPS saat web pertama kali di-load
        checkLocation();
        
        // Tarik data Spreadsheet saat web pertama kali di-load
        fetchDataFromSheet();
    </script>
</body>
</html>
